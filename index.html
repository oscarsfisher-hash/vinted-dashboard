<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinted Reselling Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #fff;
    color: #111;
    padding: 20px 24px;
    font-size: 13px;
    line-height: 1.4;
  }

  /* ── stats ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat {
    background: #f5f5f5;
    border-radius: 8px;
    padding: 14px 16px;
  }
  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: #999;
    margin-bottom: 4px;
  }
  .stat-value {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }
  .green { color: #16a34a; }
  .amber { color: #d97706; }

  /* ── charts ── */
  .charts {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .chart-card {
    background: #f5f5f5;
    border-radius: 8px;
    padding: 16px;
  }
  .chart-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: #999;
    margin-bottom: 12px;
  }
  .chart-wrap { position: relative; }
  .donut-wrap { height: 180px; }
  .bar-wrap    { height: 180px; }

  /* ── filters ── */
  .filters {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
  }
  .filters span { font-size: 11px; color: #aaa; }
  select {
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 12px;
    background: #fff;
    color: #333;
    cursor: pointer;
  }
  select:focus { outline: none; border-color: #999; }

  /* ── table ── */
  table { width: 100%; border-collapse: collapse; }
  thead th {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #aaa;
    padding: 6px 8px;
    border-bottom: 1px solid #ebebeb;
    text-align: left;
    white-space: nowrap;
    font-weight: 500;
  }
  tbody td {
    padding: 9px 8px;
    border-bottom: 1px solid #f2f2f2;
    font-size: 12px;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #fafafa; }

  .badge {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 500;
  }
  .s-sold     { background: #dcfce7; color: #15803d; }
  .s-shipped  { background: #e0f2fe; color: #0369a1; }
  .s-listed   { background: #f1f5f9; color: #64748b; }
  .s-returned { background: #fee2e2; color: #b91c1c; }

  .num { font-variant-numeric: tabular-nums; }
  .pos { color: #16a34a; font-weight: 500; }
  .neg { color: #dc2626; font-weight: 500; }
  .muted { color: #ccc; }
  .tag {
    font-size: 10px;
    color: #888;
    background: #efefef;
    border-radius: 4px;
    padding: 2px 6px;
  }

  /* ── footer ── */
  .footer {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid #f0f0f0;
    font-size: 10px;
    color: #bbb;
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>

<div class="stats">
  <div class="stat">
    <div class="stat-label">Revenue</div>
    <div class="stat-value num" id="s-rev">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Stock cost</div>
    <div class="stat-value num" id="s-cost">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Profit</div>
    <div class="stat-value num green" id="s-profit">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Margin</div>
    <div class="stat-value num green" id="s-margin">—</div>
  </div>
</div>

<div class="charts">
  <div class="chart-card">
    <div class="chart-label">Revenue split</div>
    <div class="chart-wrap donut-wrap"><canvas id="donut"></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-label">By order — realised vs potential</div>
    <div class="chart-wrap bar-wrap"><canvas id="bar"></canvas></div>
  </div>
</div>

<div class="filters">
  <span>Filter</span>
  <select id="f-order" onchange="render()">
    <option value="">All orders</option>
    <option value="June #1">June #1</option>
    <option value="June #2">June #2</option>
    <option value="Own Items">Own Items</option>
  </select>
  <select id="f-status" onchange="render()">
    <option value="">All statuses</option>
    <option value="Sold">Sold</option>
    <option value="Shipped">Shipped</option>
    <option value="Listed">Listed</option>
    <option value="Returned">Returned</option>
  </select>
</div>

<table>
  <thead>
    <tr>
      <th>Item</th>
      <th>Order</th>
      <th>Status</th>
      <th>List price</th>
      <th>Sold price</th>
      <th>Cost</th>
      <th>Profit</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<div class="footer">
  <span>Data as of 9 Jun 2026 — ask Claude to refresh when you've added new sales</span>
  <span>Vinted Reselling</span>
</div>

<script>
// ── Data (fetched 9 Jun 2026 from Notion) ─────────────────
const SALES = [
  // June #1
  { name:"Nike Miler Set",                 order:"June #1",   status:"Shipped", list:30,    sold:30,   cost:7.69  },
  { name:"UA compression shirt black",     order:"June #1",   status:"Shipped", list:15,    sold:15,   cost:3.60  },
  { name:"UA compression shirt white",     order:"June #1",   status:"Shipped", list:15,    sold:10,   cost:3.60  },

  // June #2
  { name:"UA compression shirt black #1",  order:"June #2",   status:"Listed",  list:19.99, sold:null, cost:3.60  },
  { name:"UA compression shirt black #2",  order:"June #2",   status:"Listed",  list:19.99, sold:null, cost:3.60  },
  { name:"UA compression shirt black #3",  order:"June #2",   status:"Listed",  list:19.99, sold:null, cost:3.60  },
  { name:"UA compression shirt black #4",  order:"June #2",   status:"Listed",  list:19.99, sold:null, cost:3.60  },
  { name:"Bape Polo black",                order:"June #2",   status:"Listed",  list:34.99, sold:null, cost:12.58 },
  { name:"Bape Polo white",                order:"June #2",   status:"Listed",  list:34.99, sold:null, cost:12.58 },
  { name:"Nike miler short set Black #1",  order:"June #2",   status:"Listed",  list:34.99, sold:null, cost:7.69  },
  { name:"Nike miler short set Black #2",  order:"June #2",   status:"Listed",  list:34.99, sold:null, cost:7.69  },
  { name:"Nike miler short set Green",     order:"June #2",   status:"Listed",  list:34.99, sold:null, cost:7.69  },
  { name:"Stanley Cup Pink",               order:"June #2",   status:"Listed",  list:24.99, sold:null, cost:2.87  },
  { name:"Stanley Cup Light Purple",       order:"June #2",   status:"Listed",  list:24.99, sold:null, cost:2.87  },
  { name:"Stanley Cup Dune",               order:"June #2",   status:"Listed",  list:24.99, sold:null, cost:2.87  },
  { name:"Essential shorts black #1",      order:"June #2",   status:"Listed",  list:29.99, sold:null, cost:12.75 },
  { name:"Essential shorts black #2",      order:"June #2",   status:"Listed",  list:29.99, sold:null, cost:12.75 },
  { name:"True Religion Supreme Polo",     order:"June #2",   status:"Listed",  list:74.99, sold:null, cost:19.26 },

  // Own Items (no purchase order)
  { name:"Stussy Jorts",                   order:"Own Items", status:"Shipped", list:20,    sold:20,   cost:0     },
  { name:"Replay Bomber Jacket",           order:"Own Items", status:"Listed",  list:20,    sold:null, cost:0     },
  { name:"Tommy Hilfiger knit",            order:"Own Items", status:"Listed",  list:20,    sold:null, cost:0     },
  { name:"Versace Neoprene Sweatshirt",    order:"Own Items", status:"Listed",  list:20,    sold:null, cost:0     },
  { name:"Diesel Jeans",                   order:"Own Items", status:"Listed",  list:20,    sold:null, cost:0     },
];

// ── Helpers ───────────────────────────────────────────────
const f  = n => n != null ? '£' + parseFloat(n).toFixed(2) : '<span class="muted">—</span>';
const fc = n => {
  if (n == null) return '<span class="muted">—</span>';
  const v = parseFloat(n);
  return `<span class="${v >= 0 ? 'pos' : 'neg'}">${v >= 0 ? '+' : ''}£${v.toFixed(2)}</span>`;
};
const bc = s => ({ Sold:'s-sold', Shipped:'s-shipped', Listed:'s-listed', Returned:'s-returned' }[s] || 's-listed');

let donutChart = null, barChart = null;

// ── Render ────────────────────────────────────────────────
function render() {
  const fOrder  = document.getElementById('f-order').value;
  const fStatus = document.getElementById('f-status').value;

  let rows = SALES;
  if (fOrder)  rows = rows.filter(r => r.order  === fOrder);
  if (fStatus) rows = rows.filter(r => r.status === fStatus);

  const realised = rows.filter(r => r.sold != null);
  const revenue  = realised.reduce((s,r) => s + r.sold, 0);
  const cost     = realised.reduce((s,r) => s + r.cost, 0);
  const profit   = revenue - cost;
  const margin   = revenue > 0 ? (profit / revenue) * 100 : 0;

  // Stats
  document.getElementById('s-rev').textContent    = '£' + revenue.toFixed(2);
  document.getElementById('s-cost').textContent   = '£' + cost.toFixed(2);
  document.getElementById('s-profit').textContent = (profit >= 0 ? '+' : '') + '£' + profit.toFixed(2);
  document.getElementById('s-margin').textContent = margin.toFixed(1) + '%';
  document.getElementById('s-profit').className = 'stat-value num ' + (profit >= 0 ? 'green' : 'amber');
  document.getElementById('s-margin').className = 'stat-value num ' + (margin >= 0 ? 'green' : 'amber');

  // Donut
  if (donutChart) donutChart.destroy();
  donutChart = new Chart(document.getElementById('donut'), {
    type: 'doughnut',
    data: {
      labels: ['Profit', 'Stock cost'],
      datasets: [{
        data: [Math.max(0, profit), cost],
        backgroundColor: ['#16a34a', '#1e40af'],
        borderWidth: 0,
        hoverOffset: 4
      }]
    },
    options: {
      cutout: '70%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: { padding: 12, font: { size: 11 }, boxWidth: 10 }
        },
        tooltip: {
          callbacks: { label: c => ` ${c.label}: £${parseFloat(c.raw).toFixed(2)}` }
        }
      }
    }
  });

  // Bar — use all SALES for full picture
  const orders = ['June #1', 'June #2', 'Own Items'];
  const realisedRev  = orders.map(o => SALES.filter(r => r.order===o && r.sold!=null).reduce((s,r)=>s+r.sold,0));
  const potentialRev = orders.map(o => SALES.filter(r => r.order===o && r.sold==null).reduce((s,r)=>s+r.list,0));

  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('bar'), {
    type: 'bar',
    data: {
      labels: orders,
      datasets: [
        {
          label: 'Realised',
          data: realisedRev,
          backgroundColor: '#16a34a',
          borderRadius: 4,
          stack: 'a'
        },
        {
          label: 'Listed (potential)',
          data: potentialRev,
          backgroundColor: '#e5e7eb',
          borderRadius: 4,
          stack: 'a'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 12, boxWidth: 10 } },
        tooltip: { callbacks: { label: c => ` ${c.dataset.label}: £${parseFloat(c.raw).toFixed(2)}` } }
      },
      scales: {
        y: {
          stacked: true,
          ticks: { callback: v => '£' + v, font: { size: 11 } },
          grid: { color: '#f0f0f0' }
        },
        x: { stacked: true, grid: { display: false }, ticks: { font: { size: 11 } } }
      }
    }
  });

  // Table
  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#ccc;padding:20px">No items</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r => {
    const profit = r.sold != null ? r.sold - r.cost : null;
    return `<tr>
      <td>${r.name}</td>
      <td><span class="tag">${r.order}</span></td>
      <td><span class="badge ${bc(r.status)}">${r.status}</span></td>
      <td class="num">${f(r.list)}</td>
      <td class="num">${f(r.sold)}</td>
      <td class="num">${r.cost > 0 ? f(r.cost) : '<span class="muted">—</span>'}</td>
      <td class="num">${fc(profit)}</td>
    </tr>`;
  }).join('');
}

render();
</script>
</body>
</html>
